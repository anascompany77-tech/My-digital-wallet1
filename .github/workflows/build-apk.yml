name: Build My Digital Wallet APK

on:
  workflow_dispatch: # تشغيل يدوياً بضغطة زر

# الحل الحاسم: إجبار الخادم بالكامل على استخدام كاش محلي مفتوح الصلاحيات منذ أول ثانية
env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle_home

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الملفات من مستودع GitHub
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. فك ضغط ملف كود التطبيق
    - name: Unzip Project Code
      run: |
        unzip my_digital_wallet.zip -d my_project
        
    # 3. إعداد بيئة Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    # 4. تثبيت جافا المستقرة
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 5. تثبيت المكتبات وبناء ملفات الويب
    - name: Install Dependencies & Build Web Assets
      run: |
        cd my_project
        npm install
        npm run build

    # 6. مزامنة الكود وبناء الـ APK مع تنظيف كامل للبيئة
    - name: Capacitor Sync & Build APK
      run: |
        cd my_project
        npx cap sync
        cd android
        
        # تهيئة مجلد الكاش الجديد والتأكد من صلاحياته
        mkdir -p $GRADLE_USER_HOME
        
        # إعادة توليد أداة الـ Wrapper لضمان النقاء البرمجي
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        
        # البناء النظيف النهائي
        ./gradlew assembleRelease --no-daemon --clean

    # 7. رفع ملف الـ APK النهائي لتقوم بتحميله
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Digital-Wallet-APK
        path: my_project/android/app/build/outputs/apk/release/app-release-unsigned.apk
