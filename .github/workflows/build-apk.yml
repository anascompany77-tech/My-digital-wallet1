name: Build My Digital Wallet APK

on:
  workflow_dispatch: # تشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الملفات من مستودع GitHub
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. فك ضغط ملف كود التطبيق
    - name: Unzip My Digital Wallet Code
      run: |
        unzip my_digital_wallet.zip -d my_digital_wallet_project
        
    # 3. تثبيت جافا (مطلوبة لبناء أندرويد)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    # 4. تثبيت بيئة فلاتر
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'

    # 5. جلب المكتبات وبناء الـ APK
    - name: Install Dependencies & Build APK
      run: |
        cd my_digital_wallet_project
        flutter pub get
        flutter build apk --release

    # 6. إعادة تسمية ملف الـ APK الناتج ورفعه لتقوم بتحميله
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Digital-Wallet-APK
        path: my_digital_wallet_project/build/app/outputs/flutter-apk/app-release.apk
