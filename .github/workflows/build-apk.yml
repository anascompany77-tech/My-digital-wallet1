name: Build My Digital Wallet APK

on:
  workflow_dispatch: # تشغيل يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الملفات من مستودع GitHub
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. فك ضغط ملف كود التطبيق
    - name: Unzip Project Code
      run: |
        unzip my_digital_wallet.zip -d my_project
        
    # 3. إعداد بيئة Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    # 4. تثبيت جافا 21 المتوافقة تماماً مع أحدث إصدارات بيئة الأندرويد
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    # 5. تثبيت المكتبات وبناء ملفات الويب للمشروع
    - name: Install Dependencies & Build Web Assets
      run: |
        cd my_project
        npm install
        npm run build

    # 6. حذف النظام القديم، توليد بيئة أندرويد حديثة نقية وبناء الـ APK بنمط الـ Debug الموقّع
    - name: Recreate Android Platform & Build APK
      run: |
        cd my_project
        
        # تدمير أي بقايا لمجلد أندرويد القديم
        rm -rf android
        
        # إنشاء مجلد الأندرويد الرسمي النظيف المتوافق مع Java 21
        npx cap add android
        npx cap sync
        
        # الدخول وتجميع ملف الـ APK بنمط الـ Debug لضمان التوقيع التلقائي وحل مشكلة التثبيت
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    # 7. رفع ملف الـ APK الموقّع والجاهز للتثبيت المباشر على الهاتف
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Digital-Wallet-APK
        path: my_project/android/app/build/outputs/apk/debug/app-debug.apk
